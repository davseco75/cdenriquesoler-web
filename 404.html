<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balón fuera · CD Enrique Soler</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:#080400;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;}
    .wrap{position:relative;z-index:2;padding:24px;}
    .glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(255,107,43,.1) 0%,transparent 70%);pointer-events:none;}
    .club{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:64px;}
    .club em{color:#FF6B2B;font-style:normal;}
    .code{font-family:'Bebas Neue',sans-serif;font-size:clamp(110px,22vw,220px);line-height:.85;color:#FF6B2B;text-shadow:0 10px 50px rgba(255,107,43,.3);}
    .code .ball{display:inline-block;animation:bounce 1.6s cubic-bezier(.28,.84,.42,1) infinite;}
    @keyframes bounce{
      0%,100%{transform:translateY(0) scale(1,1);}
      10%{transform:translateY(0) scale(1.06,.94);}
      35%{transform:translateY(-42px) scale(.98,1.04);}
      50%{transform:translateY(-48px) scale(1,1);}
      65%{transform:translateY(-42px) scale(.98,1.04);}
      90%{transform:translateY(0) scale(1.06,.94);}
    }
    h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(30px,6vw,52px);letter-spacing:.04em;margin:16px 0 10px;}
    p{font-size:15px;color:rgba(255,255,255,.45);max-width:440px;margin:0 auto 34px;line-height:1.7;}
    .btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
    a.btn{display:inline-flex;align-items:center;gap:9px;padding:14px 30px;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.05em;text-decoration:none;color:#fff;transition:transform .2s,box-shadow .2s;}
    .btn-primary{background:#FF6B2B;box-shadow:0 10px 30px rgba(255,107,43,.35);}
    .btn-primary:hover{transform:translateY(-3px);box-shadow:0 16px 42px rgba(255,107,43,.5);}
    .btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);}
    .btn-ghost:hover{transform:translateY(-3px);border-color:#FF6B2B;color:#FF9A6C;}
    @media(prefers-reduced-motion:reduce){.code .ball{animation:none;}}
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <div class="club">CD Enrique <em>Soler</em></div>
    <div class="code">4<span class="ball">🏀</span>4</div>
    <h1>¡Balón fuera!</h1>
    <p>Esta página no existe o ha cambiado de sitio. Pero el partido sigue: vuelve a la pista y encuentra lo que buscabas.</p>
    <div class="btns">
      <a class="btn btn-primary" href="/">🏠 Volver al inicio</a>
      <a class="btn btn-ghost" href="/calendario.html">📅 Ver calendario</a>
    </div>
  </div>
</body>
</html>
